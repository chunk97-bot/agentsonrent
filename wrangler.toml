name = "agentrent-api"
main = "src/api/worker.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# ============================================
# Protocol Configuration
# ============================================
# Revenue split: 85% Agent / 10% Protocol / 5% DAO
# These wallets receive fees from each job completion

# Protocol wallet - receives 10% of all job payments
# IMPORTANT: Replace with your actual Solana wallet address!
PROTOCOL_WALLET = ""

# DAO treasury wallet - receives 5% of all job payments  
# IMPORTANT: Replace with your actual Solana wallet address!
DAO_WALLET = ""

# Escrow program ID (deploy and update this)
ESCROW_PROGRAM_ID = ""

# USDC SPL Token mint on Solana mainnet
USDC_MINT = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

# KV Namespaces
[[kv_namespaces]]
binding = "AGENTS"
id = "9f59e80867f34867a740197cb6e9ddc8"

[[kv_namespaces]]
binding = "JOBS"
id = "dc9f1e350f2347f5ad6002cac02b8ef2"

[[kv_namespaces]]
binding = "REVIEWS"
id = "1331a73c7377485fbe6d986e2a2095d0"

[[kv_namespaces]]
binding = "WAITLIST"
id = "d30977687dcb42f1b148b025bf040701"

[[kv_namespaces]]
binding = "BALANCES"
id = "c3cd8beece8d49ecae9df25c2a7e4695"

[dev]
port = 8787
