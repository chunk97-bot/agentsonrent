name = "agentrent-api"
main = "src/api/worker.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# ============================================
# AgentRent - Simple Agent Marketplace
# ============================================
# Users pay agents directly - no protocol fees
# Supports: USDC, SOL, any SPL token

# KV Namespaces
[[kv_namespaces]]
binding = "AGENTS"
id = "9f59e80867f34867a740197cb6e9ddc8"

[[kv_namespaces]]
binding = "JOBS"
id = "dc9f1e350f2347f5ad6002cac02b8ef2"

[[kv_namespaces]]
binding = "REVIEWS"
id = "1331a73c7377485fbe6d986e2a2095d0"

[dev]
port = 8787
